<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田中涼太の個人サイト</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fa;
  color: #333;
}

/* ===== ヘッダー ===== */
header {
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

header p {
  opacity: 0.9;
}

/* ===== セクション ===== */
section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 30px;
}

/* ===== 見出し ===== */
h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* ===== カードUI ===== */
.grid {
  display: flex;
  gap: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* ===== 料金 ===== */
.price {
  text-align: center;
  font-size: 18px;
  line-height: 2;
}

/* ===== フォーム ===== */
form {
  max-width: 500px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* ===== ボタン ===== */
button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #2a5298, #6dd5ed);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.85;
}

/* ===== フッター ===== */
footer {
  text-align: center;
  padding: 20px;
  background: #2a5298;
  color: white;
}

/* ===== スマホ対応 ===== */
@media (max-width: 768px) {

  header h1 {
    font-size: 26px;
  }

  .grid {
    flex-direction: column;
  }

}
</style>
</head>

<body>

<header>
  <h1>田中涼太の個人サイト</h1>
  <p>土木 × ITで効率化と価値提供</p>
</header>

<section>
  <h2>自己紹介</h2>
  <p style="text-align:center;">
    建設業での経験を活かし、Web制作や業務効率化をサポートしています。<br>
    「分かりやすく・使いやすい」を大切にしています。
  </p>
</section>

<section>
  <h2>サービス</h2>

  <div class="grid">
    <div class="card">
      <h3>Web制作</h3>
      <p>集客できるサイトを制作</p>
    </div>

    <div class="card">
      <h3>業務効率化</h3>
      <p>Excel・作業時間を改善</p>
    </div>

    <div class="card">
      <h3>ツール開発</h3>
      <p>現場で使えるアプリ作成</p>
    </div>
  </div>

</section>

<section>
  <h2>料金</h2>

  <div class="price">
    <p>ホームページ制作：30,000円〜</p>
    <p>業務改善：10,000円〜</p>
  </div>

</section>

<section>
  <h2>お問い合わせ</h2>

  <!-- ★FormspreeのURLに変更 -->
  ree.io/f/xxxxxxx" method="POST">

    <input type="text" name="name" placeholder="お名前" required>
    <input type="email" name="email" placeholder="メールアドレス" required>
    <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

    <button type="submit">送信する</button>

  </form>

</section>

<footer>
  <p>© 2026 田中涼太</p>
</footer>

</body>
</html>
