<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田中涼太の個人サイト</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f4f6f9;
  color: #333;
}

/* ヘッダー */
header {
  background: linear-gradient(135deg, #007acc, #00c6ff);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

header h1 {
  font-size: 32px;
}

/* セクション */
section {
  max-width: 900px;
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* 見出し */
h2 {
  color: #007acc;
}

/* サービスカード（PC用） */
.service {
  display: flex;
  gap: 10px;
}

.card {
  flex: 1;
  padding: 20px;
  border-radius: 10px;
  background: #f9fbfd;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  text-align: center;
}

/* 入力 */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* ボタン */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #007acc, #00c6ff);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

/* ===== 📱スマホ対応（ここが重要）===== */
@media (max-width: 768px) {

  header {
    padding: 40px 10px;
  }

  header h1 {
    font-size: 24px;
  }

  section {
    margin: 10px;
    padding: 15px;
  }

  /* カードを縦にする */
  .service {
    flex-direction: column;
  }

  .card {
    width: 100%;
  }

}
</style>
</head>

<body>

<header>
  <h1>田中涼太の個人サイト</h1>
  <p>土木 × ITで価値提供</p>
</header>

<section>
  <h2>自己紹介</h2>
  <p>建設業の経験を活かして、ホームページ制作や業務効率化をサポートしています。</p>
</section>

<section>
  <h2>サービス</h2>

  <div class="service">
    <div class="card">
      <h3>Web制作</h3>
      <p>見やすく伝わるサイト作成</p>
    </div>

    <div class="card">
      <h3>業務改善</h3>
      <p>Excel・作業効率アップ</p>
    </div>

    <div class="card">
      <h3>アプリ開発</h3>
      <p>簡単なツール制作</p>
    </div>
  </div>

</section>

<section>
  <h2>料金</h2>
  <p>ホームページ制作：30,000円〜</p>
  <p>業務改善：10,000円〜</p>
</section>

<section>
  <h2>お問い合わせ</h2>

  <!-- ★自分のFormspreeに変更する -->
  ree.io/f/xxxxxxx" method="POST">

    <input type="text" name="name" placeholder="お名前" required>
    <input type="email" name="email" placeholder="メールアドレス" required>
    <textarea name="message" placeholder="お問い合わせ内容" required></textarea>

    <button type="submit">送信</button>

  </form>

</section>

</body>
</html>
